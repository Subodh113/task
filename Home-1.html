<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Supervisor — Home</title>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="nav.css" />

<!-- Chart.js deferred so it never blocks first paint -->
<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  :root{
    --accent:#006666; --accent-2:#009999;
    --vendor:#1a5fa8; --vendor-light:#e8f1ff;
    --muted:#6b7280; --bg:#f4f7f9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:#0f172a;
    padding-bottom:90px;
    -webkit-tap-highlight-color:transparent;
  }

  /* ── Header ── */
  header{
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    color:#fff; padding:12px 14px;
    display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; z-index:1000;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
  }
  .brand{font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px}
  .profile{display:flex;align-items:center;gap:8px;font-size:14px}
  .icon-btn{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:50%;
    width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:14px;transition:.2s}
  .icon-btn:hover{background:rgba(255,255,255,.35)}

  /* ── Layout ── */
  main{max-width:720px;margin:12px auto;padding:0 12px;display:flex;flex-direction:column;gap:12px}

  /* ── Cards ── */
  .card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .card-title{color:var(--accent);font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px}
  .card.vendor-card{border-left:3px solid var(--vendor)}
  .card-title.vendor{color:var(--vendor)}

  /* ── Dept + greeting strip ── */
  .dept-strip{
    display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(90deg,#e8faf8,#d6f3f0);
    border-radius:10px; padding:10px 14px;
  }
  .dept-strip .dept-name{font-weight:700;color:var(--accent);font-size:15px}
  .dept-strip .greeting{font-size:13px;color:var(--muted)}

  /* ── Filter tabs ── */
  .filter-row{display:flex;gap:6px;margin:10px 0 2px}
  .filter-btn{
    flex:1;padding:8px 6px;border-radius:8px;border:1.5px solid #d1faf5;
    background:#f0fdfa;color:var(--accent);font-weight:600;cursor:pointer;font-size:13px;transition:.18s
  }
  .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* ── KPI row ── */
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
  .kpi{
    padding:12px 6px;border-radius:10px;text-align:center;
    background:linear-gradient(135deg,#e8faf8,#d6f3f0);
  }
  .kpi.vendor{background:linear-gradient(135deg,#e8f1ff,#d6e6ff)}
  .kpi h3{margin:0;font-size:1.35rem;font-weight:700;color:var(--accent)}
  .kpi.vendor h3{color:var(--vendor)}
  .kpi p{margin:4px 0 0;color:var(--muted);font-size:11px;font-weight:500}

  /* ── Today's activities list ── */
  .due-list{display:flex;flex-direction:column;gap:6px;margin-top:2px}
  .due-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:9px 10px;border-radius:8px;background:#f8fffe;
    border:1px solid #e0f5f0;font-size:13px;
  }
  .due-item.vendor-item{background:var(--vendor-light);border-color:#c5dcf7}
  .due-item .due-name{font-weight:600;flex:1}
  .due-item .due-freq{font-size:11px;color:var(--muted);margin-left:8px}
  .due-btn{
    background:var(--accent);color:#fff;border:none;border-radius:6px;
    padding:5px 10px;font-size:12px;cursor:pointer;white-space:nowrap;font-weight:600
  }
  .due-btn.vendor{background:var(--vendor)}
  .see-all-link{display:block;text-align:center;color:var(--accent);font-size:13px;font-weight:600;
    margin-top:8px;text-decoration:none;padding:6px}

  /* ── Charts ── */
  .chart-box{padding:12px}
  .chart-title{font-weight:700;margin-bottom:10px;font-size:14px;
    color:#0f172a;display:flex;align-items:center;gap:7px}
  canvas{display:block}

  /* ── Top performers ── */
  .top-list{display:flex;flex-direction:column;gap:7px}
  .top-item{
    display:flex;align-items:center;gap:10px;padding:9px 10px;
    border-radius:8px;background:linear-gradient(90deg,#f8fffe,#f1fbfa);
    border:1px solid #e0f5f0;
  }
  .medal{font-size:20px;min-width:26px;text-align:center}
  .top-name{font-weight:700;font-size:13px}
  .top-count{font-size:12px;color:var(--muted)}
  .top-pct{margin-left:auto;font-size:12px;font-weight:700;color:var(--accent-2);
    background:#e8faf8;padding:2px 8px;border-radius:12px}

  /* ── Quick links ── */
  .quick-links{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .quick-link{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:12px 10px;border-radius:10px;font-weight:700;font-size:14px;
    color:#fff;text-decoration:none;transition:.18s;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
  }
  .quick-link.vendor-link{background:linear-gradient(135deg,var(--vendor),#2d7dd2)}
  .quick-link:hover{opacity:.9;transform:translateY(-1px)}

  /* ── Loader skeleton ── */
  .skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
    background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;height:16px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* ── Toast (bottom-center, above nav) ── */
  #toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
    z-index:9999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast-inner{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;color:#fff}
  .toast-success{background:#006666}
  .toast-error{background:#dc2626}

  /* ── Bottom nav override (ensure it's visible) ── */
  .bottom-nav{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
    width:92%;max-width:540px;z-index:999}

  @media(min-width:480px){
    .quick-links{grid-template-columns:repeat(4,1fr)}
  }
  @media(min-width:740px){
    main{padding:0 18px}
  }
</style>
</head>
<body>

<header>
  <div class="brand"><i class="fa-solid fa-hard-hat"></i> Supervisor</div>
  <div class="profile">
    <span id="supervisorName">Loading…</span>
    <button class="icon-btn" id="refreshBtn" title="Refresh"><i class="fa-solid fa-rotate-right"></i></button>
    <button class="icon-btn" id="logoutBtn" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
  </div>
</header>

<main>

  <!-- ── Dept + Greeting ── -->
  <div class="dept-strip">
    <div>
      <div class="dept-name" id="deptInfo">Loading…</div>
      <div class="greeting" id="greeting">Welcome!</div>
    </div>
    <i class="fa-solid fa-building-user" style="font-size:28px;color:var(--accent);opacity:.35"></i>
  </div>

  <!-- ── KPI + Filter ── -->
  <section class="card">
    <div class="filter-row" role="tablist">
      <button class="filter-btn active" data-range="today">Today</button>
      <button class="filter-btn" data-range="week">This Week</button>
      <button class="filter-btn" data-range="month">This Month</button>

    <div class="kpi-row">
      <div class="kpi"><h3 id="completedKpi">–</h3><p>Completed</p></div>
      <div class="kpi"><h3 id="pendingKpi">–</h3><p>Pending</p></div>
      <div class="kpi vendor"><h3 id="vendorDoneKpi">–</h3><p>Vendor ✓</p></div>
      <div class="kpi vendor"><h3 id="vendorPendingKpi">–</h3><p>Vendor ⏳</p></div>
    </div>
  </section>

  <!-- ── Today's Due Activities ── -->
  <section class="card">
    <div class="card-header">
      <div class="card-title"><i class="fa-solid fa-circle-check"></i> Due Today</div>
      <span id="dueBadge" style="background:#e8faf8;color:var(--accent);font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px">0</span>
    </div>
    <div id="dueList" class="due-list">
      <div class="skeleton" style="height:38px"></div>
      <div class="skeleton" style="height:38px;margin-top:4px"></div>
    </div>
    <a class="see-all-link" href="supervisor-dashboard.html">View all activities →</a>
  </section>

  <!-- ── Vendor Pending This Period ── -->
  <section class="card vendor-card">
    <div class="card-header">
      <div class="card-title vendor"><i class="fa-solid fa-truck"></i> Vendor — Pending This Period</div>
      <span id="vendorBadge" style="background:var(--vendor-light);color:var(--vendor);font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px">0</span>
    </div>
    <div id="vendorList" class="due-list">
      <div class="skeleton" style="height:38px"></div>
    </div>
  </section>

  <!-- ── 7-day Trend ── -->
  <section class="card chart-box">
    <div class="chart-title"><i class="fa-solid fa-chart-line"></i> 7-Day Activity Trend</div>
    <canvas id="trendChart" height="110"></canvas>
  </section>

  <!-- ── Supervisor Completed (dept-filtered) ── -->
  <section class="card chart-box">
    <div class="chart-title"><i class="fa-solid fa-user-group"></i> <span id="supChartTitle">Supervisor Completed</span></div>
    <canvas id="supChart" height="110"></canvas>

  <!-- ── Top Performers ── -->
  <section class="card">
    <div class="card-header">
      <div class="card-title"><i class="fa-solid fa-trophy"></i> Top Performers</div>
      <span id="rangeLabel" style="font-size:11px;color:var(--muted)">Today</span>

      <div class="skeleton" style="height:42px"></div>

  <!-- ── Quick Links ── -->
  <section class="card">

      <a class="quick-link" href="supervisor-inventory-req.html"><i class="fa-solid fa-file-circle-plus"></i> Requests</a>

</main>

  <button onclick="location.href='supervisor-dashboard.html'"><i class="fa-solid fa-list-check"></i><span>Activity</span></button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/supervisor-common.js"></script>

<script>
/* ═══════════════════════════════════════════════════
   GLOBALS
═══════════════════════════════════════════════════ */
let supervisorDept = '';
let supervisorDisplayName = '';
let currentRange = 'today';
let trendChart = null;
let supChart = null;
let autoRefreshTimer = null;

const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

/* ═══════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════ */
function esc(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg, type='success'){
  const el = document.getElementById('toast');
  const inner = document.getElementById('toastInner');
  inner.textContent = msg;
  inner.className = 'toast-inner toast-' + type;
  el.className = 'show';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.className=''; }, 3200);
}

/* ── Date range helpers ── */
function getRange(key){
  const now = new Date();
  if(key === 'today'){
    const s = new Date(now); s.setHours(0,0,0,0);
    const e = new Date(now); e.setHours(23,59,59,999);
    return { start:s, end:e, label:'Today' };
  }
  if(key === 'week'){
    // Calendar week: Monday → Sunday
    const day = now.getDay(); // 0=Sun
    const diffToMon = (day === 0) ? -6 : 1 - day;
    const s = new Date(now); s.setDate(now.getDate() + diffToMon); s.setHours(0,0,0,0);
    const e = new Date(s); e.setDate(s.getDate() + 6); e.setHours(23,59,59,999);
    return { start:s, end:e, label:'This Week' };
  }
  // month
  const s = new Date(now.getFullYear(), now.getMonth(), 1, 0,0,0,0);
  const e = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59,999);
  return { start:s, end:e, label:'This Month' };
}

function getWeekNumber(d){
  const date = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  date.setUTCDate(date.getUTCDate()+4-(date.getUTCDay()||7));
  const yr = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yr)/86400000)+1)/7);
}
function getFortnightNumber(d){ return d.getDate()<=15?1:2; }

/* ═══════════════════════════════════════════════════
   AUTH GUARD — nothing loads until auth resolves
═══════════════════════════════════════════════════ */
auth.onAuthStateChanged(async user => {
  if(!user){
    window.location.href = 'index.html';
    return;
  }

  /* ── Resolve department from Firestore user profile first,
         fall back to email→dept map for backward compat ── */
  let dept = '';
  try{
    const uDoc = await db.collection('users').doc(user.uid).get();
    if(uDoc.exists && uDoc.data().department) dept = uDoc.data().department;
  }catch(e){ /* ignore, use fallback */ }

  if(!dept){
    const emailMap = {
      'me@jll.com':'M&E','hk@jll.com':'H&K',
      'security@jll.com':'Security','ehs@jll.com':'EHS'
    };
    dept = emailMap[user.email] || '';
  }

  supervisorDept = dept;
  supervisorDisplayName = user.displayName || user.email.split('@')[0];

  /* cache for offline / quick reads */
  try{
    localStorage.setItem('supervisorName', supervisorDisplayName);
    localStorage.setItem('supervisorDept', supervisorDept);
  }catch(e){}

  /* Render header */
  document.getElementById('supervisorName').textContent = supervisorDisplayName;
  document.getElementById('deptInfo').textContent = supervisorDept ? `Dept: ${supervisorDept}` : 'No Dept Assigned';
  const hr = new Date().getHours();
  const greet = hr<12?'Good Morning':hr<17?'Good Afternoon':'Good Evening';
  document.getElementById('greeting').textContent = `${greet}, ${supervisorDisplayName}!`;

  if(!supervisorDept) showToast('⚠️ No department assigned', 'error');

  /* Update supervisor chart title */
  document.getElementById('supChartTitle').textContent =
    supervisorDept ? `${supervisorDept} — Supervisor Completed` : 'All Supervisors Completed';

  /* Initial data load */
  await loadAll('today');

  /* Auto-refresh every 10 minutes */
  autoRefreshTimer = setInterval(()=> loadAll(currentRange), 10*60*1000);
});

/* ═══════════════════════════════════════════════════
   MAIN LOAD ORCHESTRATOR
═══════════════════════════════════════════════════ */
async function loadAll(rangeKey){
  currentRange = rangeKey;

  /* Update active filter button */
  document.querySelectorAll('.filter-btn').forEach(b=>
    b.classList.toggle('active', b.dataset.range===rangeKey)
  );
  document.getElementById('rangeLabel').textContent = getRange(rangeKey).label;

  /* Run all sections in parallel */
  await Promise.all([
    loadKpiAndCharts(rangeKey),
    loadDueToday(),
    loadVendorPending(),
  ]);
}

/* ═══════════════════════════════════════════════════
   KPI + TREND + SUPERVISOR CHART
   ONE query for last 7 days (trend), ONE for selected range (KPIs + charts)
═══════════════════════════════════════════════════ */
async function loadKpiAndCharts(rangeKey){
  const { start, end } = getRange(rangeKey);

  /* Single Firestore read for the selected range */
  let docs = [];
  try{
    const snap = await db.collection('submissions')
      .where('timestamp','>=', firebase.firestore.Timestamp.fromDate(start))
      .where('timestamp','<=', firebase.firestore.Timestamp.fromDate(end))
      .orderBy('timestamp','desc')
      .get();

    docs = snap.docs.map(d=>({ ...d.data(), _id:d.id }));
  }catch(err){
    console.warn('KPI query failed:', err.message);
    showToast('Could not load KPI data', 'error');
  }

  /* Filter to this supervisor's department */
  const myDocs = supervisorDept
    ? docs.filter(d => d.department === supervisorDept || d.department === 'Vendor')
    : docs;

  const internalDocs = myDocs.filter(d => d.department !== 'Vendor');
  const vendorDocs   = myDocs.filter(d => d.department === 'Vendor');

  const completed        = internalDocs.filter(d=> Array.isArray(d.photos) && d.photos.length>0).length;
  const vendorDone       = vendorDocs.filter(d=> Array.isArray(d.photos) && d.photos.length>0).length;

  /* Pending = schedules due in range NOT yet submitted */
  const pending    = await calcPending(rangeKey);
  const vendorPend = await calcVendorPending(); /* re-uses cached data */

  document.getElementById('completedKpi').textContent  = completed;
  document.getElementById('pendingKpi').textContent     = pending;
  document.getElementById('vendorDoneKpi').textContent  = vendorDone;
  document.getElementById('vendorPendingKpi').textContent = vendorPend;

  /* ── 7-day trend — single query, group client-side ── */
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate()-6); sevenDaysAgo.setHours(0,0,0,0);
  let trendDocs = docs; /* if range already covers 7 days, reuse */
  if(rangeKey !== 'week' && rangeKey !== 'month'){
    try{
      const tSnap = await db.collection('submissions')
        .where('timestamp','>=', firebase.firestore.Timestamp.fromDate(sevenDaysAgo))
        .orderBy('timestamp','desc')
        .get();
      trendDocs = tSnap.docs.map(d=>d.data());
    }catch(e){ trendDocs = []; }
  }

  /* Filter trend to dept */
  const myTrendDocs = supervisorDept
    ? trendDocs.filter(d=>d.department===supervisorDept)
    : trendDocs;

  /* Group by day */
  const dayCounts = {};
  myTrendDocs.forEach(d=>{
    if(!d.timestamp || !d.photos || !d.photos.length) return;
    const dt = d.timestamp.toDate ? d.timestamp.toDate() : new Date(d.date);
    const k  = dt.toISOString().slice(0,10);
    dayCounts[k] = (dayCounts[k]||0)+1;
  });

  const tLabels=[], tValues=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    tLabels.push(d.toLocaleDateString(undefined,{weekday:'short',day:'numeric'}));
    tValues.push(dayCounts[d.toISOString().slice(0,10)]||0);
  }
  renderTrend(tLabels, tValues);

  /* ── Supervisor completed chart (dept-filtered) ── */
  const supMap={};
  internalDocs.forEach(d=>{
    if(!d.photos||!d.photos.length) return;
    const sup = d.supervisor||'Unknown';
    supMap[sup]=(supMap[sup]||0)+1;
  });
  const supEntries = Object.entries(supMap).map(([name,count])=>({name,count}))
    .sort((a,b)=>b.count-a.count);

  renderSupervisors(supEntries.map(s=>s.name), supEntries.map(s=>s.count));
  renderTopPerformers(supEntries);
}

/* ── Correct pending: count schedules due that have no submission ── */
async function calcPending(rangeKey){
  try{
    const today = new Date();
    const { start, end } = getRange(rangeKey);
    const todayName = dayNames[today.getDay()];

    const [schedSnap, subSnap] = await Promise.all([
      db.collection('activitySchedules').get(),
      db.collection('submissions')
        .where('timestamp','>=', firebase.firestore.Timestamp.fromDate(start))
        .where('timestamp','<=', firebase.firestore.Timestamp.fromDate(end))
        .get()
    ]);

    const submitted = new Set();
    subSnap.forEach(d=>{
      const s=d.data();
      if(s.photos&&s.photos.length>0) submitted.add(`${s.department}__${s.activityName}`);
    });

    let pending=0;
    schedSnap.forEach(doc=>{
      const s=doc.data();
      if(s.activityType==='vendor') return;
      if(supervisorDept && s.department!==supervisorDept) return;
      if(submitted.has(`${s.department}__${s.activityName}`)) return;

      /* Check if due in this range */
      let due=false;
      if(s.frequency==='Daily') due=true;
      else if(s.frequency==='Weekly') due=(s.recurringDays||[]).includes(todayName);
      else if(s.nextDate){
        const nd=new Date(s.nextDate);
        due=(nd>=start&&nd<=end);
      }
      if(due) pending++;
    });
    return pending;
  }catch(e){ return '?'; }
}

/* ── Vendor pending count (period-based) ── */
async function calcVendorPending(){
  try{
    const now=new Date();
    const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
    const [vSchedSnap,vSubSnap]=await Promise.all([
      db.collection('activitySchedules').where('activityType','==','vendor').get(),
      db.collection('submissions')
        .where('activityType','==','vendor')
        .where('timestamp','>=',firebase.firestore.Timestamp.fromDate(monthStart))
        .get()
    ]);
    const allVSubs=vSubSnap.docs.map(d=>d.data());
    let count=0;
    vSchedSnap.forEach(doc=>{
      if(isVendorDueThisPeriod(doc.data(),allVSubs)) count++;
    });
    return count;
  }catch(e){ return '?'; }
}

/* ═══════════════════════════════════════════════════
   DUE TODAY — internal activities for supervisor
═══════════════════════════════════════════════════ */
async function loadDueToday(){
  const container=document.getElementById('dueList');
  const badge=document.getElementById('dueBadge');

  try{
    const today=new Date();
    const todayName=dayNames[today.getDay()];
    const dayStart=new Date(today); dayStart.setHours(0,0,0,0);
    const dayEnd=new Date(today); dayEnd.setHours(23,59,59,999);

    const [schedSnap,subSnap]=await Promise.all([
      db.collection('activitySchedules').orderBy('createdAt','desc').get(),
      db.collection('submissions')
        .where('timestamp','>=',firebase.firestore.Timestamp.fromDate(dayStart))
        .where('timestamp','<', firebase.firestore.Timestamp.fromDate(dayEnd))
        .get()
    ]);

    const done=new Set();
    subSnap.forEach(d=>{
      const s=d.data();
      if(s.photos&&s.photos.length>0) done.add(`${s.department}__${s.activityName}`);
    });

    const dueTodayItems=[];
    schedSnap.forEach(doc=>{
      const s=doc.data();
      if(s.activityType==='vendor') return;
      if(supervisorDept && s.department!==supervisorDept) return;
      if(done.has(`${s.department}__${s.activityName}`)) return;

      let show=false;
      if(s.frequency==='Daily') show=true;
      else if(s.frequency==='Weekly') show=(s.recurringDays||[]).includes(todayName);
      else if(s.nextDate){
        const nd=new Date(s.nextDate);
        show=(nd.getDate()===today.getDate()&&nd.getMonth()===today.getMonth());
      }
      if(show) dueTodayItems.push({ name:s.activityName, freq:s.frequency, dept:s.department, id:doc.id });
    });

    badge.textContent=dueTodayItems.length;
    container.innerHTML='';

    if(!dueTodayItems.length){
      container.innerHTML=`<div style="text-align:center;color:#4caf50;padding:12px;font-size:13px;font-weight:600">
        <i class="fa-solid fa-circle-check"></i> All activities completed for today!
      </div>`;
      return;
    }

    /* Show max 4 items; link shows the rest */
    dueTodayItems.slice(0,4).forEach(item=>{
      const div=document.createElement('div');
      div.className='due-item';
      div.innerHTML=`
        <div class="due-name">${esc(item.name)}</div>
        <span class="due-freq">${esc(item.freq)}</span>
        <button class="due-btn">Upload</button>`;
      div.querySelector('button').onclick=()=>{
        location.href=`upload-activity.html?department=${encodeURIComponent(item.dept)}&activity=${encodeURIComponent(item.name)}&id=${item.id}`;
      };
      container.appendChild(div);
    });

    if(dueTodayItems.length>4){
      const more=document.createElement('div');
      more.style.cssText='text-align:center;font-size:12px;color:var(--muted);padding:4px';
      more.textContent=`+${dueTodayItems.length-4} more — see Activities`;
      container.appendChild(more);
    }
  }catch(e){
    console.error('loadDueToday error',e);
    container.innerHTML=`<div style="color:#dc2626;font-size:13px;padding:8px">Could not load today's activities</div>`;
  }
}

/* ═══════════════════════════════════════════════════
   VENDOR PENDING THIS PERIOD
═══════════════════════════════════════════════════ */
async function loadVendorPending(){
  const container=document.getElementById('vendorList');
  const badge=document.getElementById('vendorBadge');

  try{
    const now=new Date();
    const monthStart=new Date(now.getFullYear(),now.getMonth(),1);

    const [vSchedSnap,vSubSnap]=await Promise.all([
      db.collection('activitySchedules').where('activityType','==','vendor').get(),
      db.collection('submissions')
        .where('activityType','==','vendor')
        .where('timestamp','>=',firebase.firestore.Timestamp.fromDate(monthStart))
        .get()
    ]);

    const allVSubs=vSubSnap.docs.map(d=>d.data());
    const pending=[];

    vSchedSnap.forEach(doc=>{
      const s=doc.data();
      if(isVendorDueThisPeriod(s,allVSubs)){
        pending.push({ name:s.activityName, vendor:s.vendorName||'Vendor', freq:s.frequency, id:doc.id });
      }
    });

    badge.textContent=pending.length;
    container.innerHTML='';

    if(!pending.length){
      container.innerHTML=`<div style="text-align:center;color:#4caf50;padding:10px;font-size:13px;font-weight:600">
        <i class="fa-solid fa-circle-check"></i> All vendor visits confirmed this period!
      </div>`;
      return;
    }

    pending.forEach(item=>{
      const periodLabel=getVendorPeriodLabel(item.freq);
      const div=document.createElement('div');
      div.className='due-item vendor-item';
      div.innerHTML=`
        <div style="flex:1">
          <div class="due-name" style="color:var(--vendor)">${esc(item.vendor)}</div>
          <div style="font-size:11px;color:var(--muted)">${esc(item.name)} · ${periodLabel}</div>
        </div>
        <button class="due-btn vendor">Confirm</button>`;
      div.querySelector('button').onclick=()=>{
        location.href=`upload-activity.html?department=Vendor&activity=${encodeURIComponent(item.name)}&id=${item.id}&vendor=${encodeURIComponent(item.vendor)}`;
      };
      container.appendChild(div);
    });
  }catch(e){
    console.error('loadVendorPending error',e);
    container.innerHTML=`<div style="color:#dc2626;font-size:13px;padding:8px">Could not load vendor activities</div>`;
  }
}

/* ── Period label for vendor ── */
function getVendorPeriodLabel(freq){
  const now=new Date();
  if(freq==='Weekly'){
    const day=now.getDay();
    const diffToMon=(day===0)?-6:1-day;
    const mon=new Date(now); mon.setDate(now.getDate()+diffToMon);
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    const fmt=d=>d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    return `${fmt(mon)}–${fmt(sun)}`;
  }
  if(freq==='Bimonthly'){
    return now.getDate()<=15
      ? `1–15 ${now.toLocaleString('en',{month:'short'})}`
      : `16–end ${now.toLocaleString('en',{month:'short'})}`;
  }
  return now.toLocaleString('en',{month:'long',year:'numeric'});
}

/* ── Vendor period-due check (same logic as supervisor-dashboard) ── */
function isVendorDueThisPeriod(s,allVendorSubs){
  const now=new Date();
  const freq=s.frequency;
  if(!['Weekly','Bimonthly','Monthly'].includes(freq)) return false;
  const actName=s.activityName;
  const relevant=allVendorSubs.filter(sub=>
    sub.activityName===actName && sub.photos && sub.photos.length>0
  );
  for(const sub of relevant){
    const subDate=sub.timestamp?sub.timestamp.toDate():new Date(sub.date);
    if(freq==='Weekly'){
      if(getWeekNumber(subDate)===getWeekNumber(now)&&subDate.getFullYear()===now.getFullYear()) return false;
    }else if(freq==='Bimonthly'){
      if(getFortnightNumber(subDate)===getFortnightNumber(now)&&
         subDate.getMonth()===now.getMonth()&&subDate.getFullYear()===now.getFullYear()) return false;
    }else if(freq==='Monthly'){
      if(subDate.getMonth()===now.getMonth()&&subDate.getFullYear()===now.getFullYear()) return false;
    }
  }
  return true;
}

function renderTrend(labels, values){
  /* Wait for Chart.js to load (deferred) */
  if(typeof Chart==='undefined'){ setTimeout(()=>renderTrend(labels,values),200); return; }
  const ctx=document.getElementById('trendChart').getContext('2d');
  if(trendChart) trendChart.destroy();
  trendChart=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[{
        label:'Completed',data:values,tension:0.3,fill:true,
        backgroundColor:'rgba(0,153,153,0.12)',
        borderColor:'#009999',borderWidth:2,
        pointBackgroundColor:'#009999',pointRadius:4,pointHoverRadius:6
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:i=>i[0].label}}},
      scales:{y:{beginAtZero:true,ticks:{precision:0,stepSize:1}},x:{ticks:{font:{size:11}}}}
    }
  });
}

function renderSupervisors(labels, values){
  if(typeof Chart==='undefined'){ setTimeout(()=>renderSupervisors(labels,values),200); return; }
  const ctx=document.getElementById('supChart').getContext('2d');
  if(supChart) supChart.destroy();
  if(!labels.length){
    ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
    ctx.fillStyle='#aaa'; ctx.font='13px Inter'; ctx.textAlign='center';
    ctx.fillText('No data for this range',ctx.canvas.width/2,60);

  }
  supChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'Completed',data:values,
        backgroundColor:'rgba(0,102,102,0.75)',
        borderRadius:5,hoverBackgroundColor:'#009999'
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{precision:0,stepSize:1}},x:{ticks:{font:{size:11}}}}
    }
  });
}

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
function renderTopPerformers(entries){
  const container=document.getElementById('topList');
  container.innerHTML='';
  if(!entries.length){
    container.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px">No activity data for this range</div>';
    return;
  }
  const medals=['🥇','🥈','🥉'];
  const maxCount=entries[0].count||1;
  entries.slice(0,3).forEach((s,i)=>{
    const pct=Math.round((s.count/maxCount)*100);
    const div=document.createElement('div');
    div.className='top-item';
    div.innerHTML=`
      <div class="medal">${medals[i]||'👤'}</div>
      <div style="flex:1">
        <div class="top-name">${esc(s.name)}</div>
        <div class="top-count">${s.count} completed</div>
      </div>
      <div class="top-pct">${pct}%</div>`;
    container.appendChild(div);
  });
}
